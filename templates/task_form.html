<!-- task form page -->
<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
    <h2>Add Task</h2>
    <form method="POST">
        <div class="mb-2"><input type="text" name="title" class="form-control" placeholder="Task Title" required></div>
        <div class="mb-2"><textarea name="details" class="form-control" placeholder="Details"></textarea></div>
        <div class="mb-2"><textarea name="notes" class="form-control" placeholder="Notes"></textarea></div>
        <div class="mb-2"><input type="date" name="start_date" class="form-control" required></div>
        <div class="mb-2"><input type="date" name="end_date" class="form-control" required></div>
        <div class="mb-2">
            <select name="status" class="form-control">
                <option>Pending</option>
                <option>In Progress</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Task</button>
    </form>
</body>
</html>
